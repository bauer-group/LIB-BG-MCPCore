name: 🧪 Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '*.MD'
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:

jobs:
  quality:
    name: 🔍 Lint, type-check, unit tests
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🐍 Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: 📦 Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: ⚙️ Install (dev + openapi)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,openapi]"

      - name: 🎨 Ruff
        run: ruff check src tests

      - name: 🔍 Mypy (strict)
        run: mypy src/bg_mcpcore

      - name: 🧪 Pytest
        run: pytest -q

  validate-extras:
    name: 📦 Validate extra [${{ matrix.extra }}]
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      matrix:
        extra: ["openapi", "redis", "oauth-providers", "tasks", "testkit"]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🐍 Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: 📦 Install base + extra
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -e ".[${{ matrix.extra }}]"

      - name: ✅ Verify the core imports with only this extra present
        run: |
          python -c "import bg_mcpcore; print('core', bg_mcpcore.__version__)"
          python -c "from bg_mcpcore import build_app_from_profile, load_profile, make_cli; print('public API ok')"
