# ─────────────────────────────────────────────────────────────────────────────
#  Teams Notifications — post repository activity to Microsoft Teams
# ─────────────────────────────────────────────────────────────────────────────
#  WHAT
#    Calls the shared BAUER GROUP `teams-notifications.yml` reusable workflow to
#    send a Teams message on notable repository events. Defaults to errors-only
#    so the channel surfaces failures rather than routine green runs.
#
#  WHEN
#    Pushes/PRs to main, releases, issue activity, the completion of any other
#    workflow (to report failures), and a manual custom-message trigger.
#
#  REQUIREMENTS
#    The Teams webhook URL is an org/repo secret, passed via `secrets: inherit`.
#
#  PERMISSIONS
#    None requested — the reusable workflow only sends an outbound webhook; it
#    needs no write access to this repository.
# ─────────────────────────────────────────────────────────────────────────────

name: 📢 Teams Notifications

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, closed, reopened]
  release:
    types: [published, prereleased]
  issues:
    types: [opened, closed, reopened]
  # Report the outcome of every other workflow (this is how CI failures reach Teams).
  workflow_run:
    workflows: ["*"]
    types: [completed]
  workflow_dispatch:
    inputs:
      message:
        description: "Custom message to send"
        required: true
        type: string
      channel:
        description: "Teams channel (webhook name)"
        required: false
        type: string
        default: "general"
  workflow_call:
    inputs:
      notification-level:
        description: "all | errors-only"
        required: false
        type: string
        default: "errors-only"

# No top-level permissions block: the called automation-templates workflow
# requests actions/contents/issues/pull-requests: read, which must be granted by
# the caller. Pinning `permissions: {}` here denies them and breaks the call
# ("requesting 'read' but only allowed 'none'"). Inherit the default token scopes,
# matching the working NocoDB_SimpleClient setup.

jobs:
  notify-teams:
    name: Send Teams Notification
    uses: bauer-group/automation-templates/.github/workflows/teams-notifications.yml@main
    with:
      notification-level: ${{ inputs.notification-level || 'errors-only' }}
    secrets: inherit
