# ─────────────────────────────────────────────────────────────────────────────
#  Documentation — generate README.MD from its template
# ─────────────────────────────────────────────────────────────────────────────
#  WHAT
#    Calls the shared BAUER GROUP `documentation.yml` reusable workflow, which
#    renders docs/README.template.MD into the published README.MD — expanding
#    the placeholders ({{COMPANY_NAME}}, {{VERSION}}, {{DATE}}, {{REPO_URL}},
#    {{CURRENT_BRANCH}}, …) from the repo/tag context. README.template.MD is the
#    source of truth; README.MD is generated and should not be hand-edited.
#
#  WHEN
#    When the template changes (push/PR to main touching it), manually, and on
#    release (workflow_call from the release pipeline, which passes the tag).
#
#  PERMISSIONS
#    contents: write       — commit the regenerated README.MD
#    pull-requests: write  — open/update a PR with the change when applicable
# ─────────────────────────────────────────────────────────────────────────────

name: 📄 Documentation

on:
  push:
    branches: [main]
    paths:
      - "docs/README.template.MD"
  pull_request:
    branches: [main]
    paths:
      - "docs/README.template.MD"
  workflow_dispatch:
    inputs:
      force-update:
        description: "Regenerate even when the template is unchanged"
        type: boolean
        default: false
  workflow_call:
    inputs:
      tag-name:
        description: "Tag that triggered the update"
        type: string
        required: false
        default: ""
      force-update:
        description: "Regenerate even when the template is unchanged"
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-docs:
    name: Generate Documentation
    uses: bauer-group/automation-templates/.github/workflows/documentation.yml@main
    with:
      tag-name: ${{ inputs.tag-name || github.ref_name }}
      force-update: ${{ inputs.force-update || false }}
    secrets: inherit
