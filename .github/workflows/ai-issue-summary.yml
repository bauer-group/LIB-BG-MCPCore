# ─────────────────────────────────────────────────────────────────────────────
#  Issue AI Summary — auto-summarise new issues and PRs
# ─────────────────────────────────────────────────────────────────────────────
#  WHAT
#    Calls the shared BAUER GROUP `modules-ai-issue-summary.yml` reusable
#    workflow to post an AI-generated technical summary (and suggested labels /
#    priority) as a comment on each new issue and PR, to speed up triage.
#
#  WHEN
#    On issue open and PR open.
#
#  TRIGGER NOTE
#    `pull_request_target` is used so the summariser has a write token for PRs
#    from forks. It only reads the PR's title/body and posts a comment — it does
#    NOT execute PR code.
#
#  PERMISSIONS
#    issues: write         — comment + label issues
#    pull-requests: write  — comment + label PRs
#    contents: read        — read repo context for the summary
#    models: read          — call the GitHub Models inference endpoint
# ─────────────────────────────────────────────────────────────────────────────

name: 🤖 Issue AI Summary

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write
  contents: read
  models: read

jobs:
  summarize-new-issue:
    name: Generate AI Summary
    if: github.event_name == 'issues' || github.event_name == 'pull_request_target'
    uses: bauer-group/automation-templates/.github/workflows/modules-ai-issue-summary.yml@main
    with:
      summary-type: "technical"   # brief | detailed | technical | user-friendly
      add-labels: true            # apply AI-suggested labels
      add-priority: true          # apply an AI-suggested priority label
      translate: ""               # empty = no translation
      model: "gpt-4o"
      comment-template: |
        ## 🤖 AI Analysis for bg-mcpcore

        {summary}

        ### Impact Assessment
        This issue/PR affects bg-mcpcore, the shared framework for BAUER GROUP
        REST-API MCP servers (consumed by bg-zammad-mcp, bg-shlink-mcp, ...).

        ---
        *Generated automatically to aid triage; it may not be 100% accurate.*
    secrets: inherit
