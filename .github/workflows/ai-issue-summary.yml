name: 🤖 Issue AI Summary

# Automatically summarize new issues and PRs using AI.
# Uses the modular AI summary component from the Bauer Group automation templates.

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write
  contents: read
  models: read

jobs:
  summarize-new-issue:
    name: Generate AI Summary
    if: github.event_name == 'issues' || github.event_name == 'pull_request_target'
    uses: bauer-group/automation-templates/.github/workflows/modules-ai-issue-summary.yml@main
    with:
      summary-type: "technical"
      add-labels: true
      add-priority: true
      translate: ""
      model: "gpt-4o"
      comment-template: |
        ## 🤖 AI Analysis for bg-mcpcore

        {summary}

        ### Impact Assessment
        This issue/PR affects bg-mcpcore, the shared framework for BAUER GROUP
        REST-API MCP servers (consumed by bg-zammad-mcp, bg-shlink-mcp, ...).

        ---
        *This summary was automatically generated by AI to help with triage and may not be 100% accurate.*
    secrets: inherit
